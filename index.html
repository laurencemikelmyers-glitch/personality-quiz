<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personality Quiz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="text-center mt-4">What Type of Personality Are You?</h1>

  <!-- Question 1 -->
  <div class="container d-flex justify-content-center">
    <div class="card my-4 p-4 question-block" style="width: 75%;">
      <h4 class="mb-3">What do you do on weekends?</h4>
      <div class="row g-2">
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Go out with friends</button>
        </div>
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Stay home and relax</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Question 2 -->
  <div class="container d-flex justify-content-center">
    <div class="card my-4 p-4 question-block" style="width: 75%;">
      <h4 class="mb-3">Your favorite color?</h4>
      <div class="row g-2">
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="2">Blue</button>
        </div>
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Red</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Question 3 -->
  <div class="container d-flex justify-content-center">
    <div class="card my-4 p-4 question-block" style="width: 75%;">
      <h4 class="mb-3">Choose your ideal pet:</h4>
      <div class="row g-2">
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Dog</button>
        </div>
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Cat</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Question 4 -->
  <div class="container d-flex justify-content-center">
    <div class="card my-4 p-4 question-block" style="width: 75%;">
      <h4 class="mb-3">Favorite time of day?</h4>
      <div class="row g-2">
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="2">Morning</button>
        </div>
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Night</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Question 5 -->
  <div class="container d-flex justify-content-center">
    <div class="card my-4 p-4 question-block" style="width: 75%;">
      <h4 class="mb-3">Pick a hobby:</h4>
      <div class="row g-2">
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Reading</button>
        </div>
        <div class="col-6">
          <button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Sports</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Result Button -->
  <div class="container d-flex justify-content-center">
    <button id="show-result" class="btn btn-success my-4">Show Results</button>
  </div>

  <!-- Result Output -->
  <div class="container d-flex justify-content-center">
    <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
      <h3>Your Result:</h3>
      <p id="result-text"></p>
    </div>
  </div>

  <!-- Connect JS -->
  <script src="script.js"></script>
</body>
</html>
